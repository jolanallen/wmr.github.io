<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/WMR.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WMR - Interactive MindMap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body class="map-body">
    <div id="map-controls">
      <a href="/" class="back-btn">← Accueil</a>
      <div class="map-title">Web MindMap Recipes</div>
      <div class="zoom-controls">
        <button id="zoom-in">+</button>
        <button id="zoom-out">−</button>
        <button id="zoom-reset">⟲</button>
      </div>
    </div>

    <div id="map-viewport">
      <div id="map-container">
        <svg id="map-svg-layer"></svg>
        <div id="map-nodes-layer"></div>
      </div>
    </div>

    <div id="loading-overlay">
      <div class="loader"></div>
      <p>Chargement de la MindMap...</p>
    </div>

    <script type="module" src="/src/map.ts"></script>
  </body>
</html>
